name: Positive Gate

on:
  pull_request:
    types: [opened, synchronize, edited]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for run phrase
        id: run
        uses: ./
        with:
          phrase: 'run'

      - name: Running
        if: steps.run.outputs.detected
        run: echo Running
